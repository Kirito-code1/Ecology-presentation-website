<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Спасибо за внимание</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Open+Sans:wght@400;600&amp;family=Playfair+Display:ital,wght@1,400;1,700&amp;family=Russo+One&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Open Sans', sans-serif; 
            background-color: #064e3b; /* emerald-900 */
        }
        
        .slide-container { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Background Elements */
        .bg-layer {
            position: absolute;
            inset: 0;
            background-color: #022c22;
            z-index: 0;
        }

        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url("https://page.gensparksite.com/slides_images/be38d1bcc1d234facfd068e9b9f28c48.webp");
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            filter: grayscale(30%);
            z-index: 1;
        }
        
        .overlay {
            position: absolute;
            inset: 0;
            background-color: rgba(6, 78, 59, 0.85);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 4rem;
        }

        .quote-container {
            position: relative;
            max-width: 900px;
            text-align: center;
            margin-bottom: 4rem;
        }

        .quote-icon {
            font-size: 4rem;
            color: rgba(52, 211, 153, 0.3); /* emerald-400 */
            position: absolute;
            top: -2rem;
            left: -3rem;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            line-height: 1.2;
            color: #ffffff;
            font-weight: 700;
        }

        .divider {
            width: 80px;
            height: 4px;
            background-color: #34d399; /* emerald-400 */
            border-radius: 2px;
            margin: 2rem auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1px 1fr 1px 1fr;
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
            align-items: center;
        }

        .vertical-line {
            width: 1px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .footer-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #e2e8f0;
        }

        .qr-box {
            background: white;
            padding: 0.5rem;
            border-radius: 0.75rem;
            width: 120px;
            height: 120px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            width: 100%;
            justify-content: center;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .title-font { font-family: 'Montserrat', sans-serif; }
    </style>
<link href="slides-responsive.css" rel="stylesheet"/>
</head>
<body class="slide-page">
<div class="slide-container">
<!-- Background -->
<div class="bg-layer"></div>
<div class="bg-image"></div>
<div class="overlay"></div>
<!-- Content -->
<div class="content-wrapper">
<!-- Main Quote -->
<div class="quote-container">
<i class="fas fa-quote-left quote-icon"></i>
<p class="quote-text">
                «Мы не унаследовали Землю у своих предков — мы взяли её взаймы у своих детей.»
            </p>
<div class="divider"></div>
<p class="text-emerald-300 font-semibold uppercase tracking-widest text-lg title-font">Спасибо за внимание!</p>
</div>
<!-- Footer Info -->
<div class="footer-grid">
<!-- Column 1: Contacts -->
<div class="footer-col">
<div class="mb-3">
<i class="fas fa-leaf text-3xl text-emerald-400 mb-2"></i>
<p class="text-white font-bold text-lg title-font">Будущее планеты</p>
</div>
<div class="space-y-2 text-sm text-gray-300">
<p><i class="fas fa-globe mr-2 text-emerald-500"></i>eco-school-project.ru</p>
<p><i class="fas fa-envelope mr-2 text-emerald-500"></i>team@eco-project.ru</p>
</div>
</div>
<!-- Separator -->
<div class="vertical-line"></div>
<!-- Column 2: QR Code -->
<div class="footer-col">
<div class="qr-box mb-3">
<img alt="QR Code" class="w-full h-full object-contain" src="https://page.gensparksite.com/slides_images/0c2f91d1a117c6b78f8c63ef2faee163.png"/>
</div>
<p class="text-emerald-300 font-bold uppercase text-xs tracking-wider">Стать волонтёром</p>
<p class="text-gray-400 text-[10px]">Сканируй для регистрации</p>
</div>
<!-- Separator -->
<div class="vertical-line"></div>
<!-- Column 3: Socials & Wish -->
<div class="footer-col">
<div class="w-full max-w-[200px]">
<div class="social-btn">
<i class="fab fa-vk text-blue-400"></i>
<p class="text-sm font-semibold">@eco_school_club</p>
</div>
<div class="social-btn">
<i class="fab fa-telegram text-blue-300"></i>
<p class="text-sm font-semibold">t.me/eco_future</p>
</div>
</div>
<div class="mt-4 bg-emerald-500 bg-opacity-20 px-4 py-2 rounded-full border border-emerald-500 border-opacity-30">
<p class="text-white font-bold italic text-sm">
                        Увидимся на ближайшей акции!
                    </p>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
