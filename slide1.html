<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Будущее планеты в наших руках</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&amp;family=Open+Sans:wght@400;600&amp;family=Russo+One&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Open Sans', sans-serif; background-color: #0f172a; }
        
        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            overflow: hidden;
        }

        /* Background Image */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Color Overlay - Using solid color with opacity instead of gradient */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(6, 78, 59, 0.80); /* emerald-900 with opacity */
            z-index: 1;
        }

        /* Diagonal Shape for dynamism */
        .diagonal-shape {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            background-color: rgba(20, 184, 166, 0.2); /* teal-500 low opacity */
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
            z-index: 2;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem 5rem;
        }

        .title-font {
            font-family: 'Montserrat', sans-serif;
        }

        .accent-font {
            font-family: 'Russo One', sans-serif;
        }

        /* Glassmorphism Card for Details */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            padding: 1.5rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .circle-decor {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.05);
            z-index: 2;
        }

    </style>
<link href="slides-responsive.css" rel="stylesheet"/>
</head>
<body class="slide-page">
<div class="slide-container">
<!-- Background -->
<img alt="Nature Background" class="bg-image" src="https://page.gensparksite.com/slides_images/afe94bcd4ae5261401cf206cb242f169.webp"/>
<!-- Overlays -->
<div class="overlay"></div>
<div class="diagonal-shape"></div>
<!-- Decor Elements -->
<div class="circle-decor" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
<div class="circle-decor" style="width: 200px; height: 200px; bottom: 150px; right: 10%;"></div>
<!-- Floating Leaves Icons -->
<i class="fas fa-leaf text-white opacity-10 absolute text-9xl" style="top: 10%; right: 5%; transform: rotate(45deg); z-index: 3;"></i>
<i class="fas fa-seedling text-white opacity-10 absolute text-8xl" style="bottom: 30%; left: 5%; transform: rotate(-15deg); z-index: 3;"></i>
<!-- Main Content -->
<div class="content-layer">
<!-- Top Section: Header -->
<div class="flex flex-col justify-center flex-grow">
<div class="flex items-center mb-6">
<div class="w-16 h-2 bg-green-400 rounded mr-4"></div>
<p class="text-green-300 font-bold tracking-widest uppercase">Экологический проект</p>
</div>
<h1 class="text-white text-7xl font-black title-font leading-tight mb-8 drop-shadow-lg">
                    БУДУЩЕЕ ПЛАНЕТЫ <br/>
<span class="text-transparent bg-clip-text text-green-300" style="-webkit-text-stroke: 1px transparent;">В НАШИХ РУКАХ</span>
</h1>
<div class="flex items-center">
<div class="bg-white bg-opacity-20 p-4 rounded-full mr-6">
<i class="fas fa-globe-americas text-4xl text-green-300"></i>
</div>
<div>
<p class="text-3xl text-white font-light italic border-l-4 border-green-400 pl-4">
                            Действуй сегодня — живи завтра
                        </p>
</div>
</div>
</div>
<!-- Bottom Section: Info Panel -->
<div class="glass-panel w-full mt-auto">
<!-- Team Info -->
<div class="flex flex-col">
<p class="text-green-300 text-sm font-bold uppercase mb-1">Команда</p>
<p class="text-white text-xl font-bold font-montserrat">Green Future</p>
</div>
<!-- Divider -->
<div class="h-10 w-px bg-white opacity-30 mx-4"></div>
<!-- School Info -->
<div class="flex flex-col">
<p class="text-green-300 text-sm font-bold uppercase mb-1">Школа / Класс</p>
<p class="text-white text-lg">№ 22, 11 «А»</p>
</div>
<!-- Divider -->
<div class="h-10 w-px bg-white opacity-30 mx-4"></div>
<!-- Date -->
<div class="flex flex-col">
<p class="text-green-300 text-sm font-bold uppercase mb-1">Дата</p>
<p class="text-white text-lg">03.03.2026</p>
</div>
<!-- Logo Placeholder -->
<div class="flex items-center justify-center bg-white rounded-full w-14 h-14 ml-auto">
<i class="fas fa-school text-green-800 text-2xl"></i>
</div>
</div>
</div>
</div>
</body>
</html>
